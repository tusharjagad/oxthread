name: OxThread CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx prisma generate
      - run: npm run build
        env:
          DATABASE_URL: postgresql://dummy
          NEXTAUTH_SECRET: dummy
          JWT_SECRET: dummy


